name: Trigger Playwright Tests

run-name: "${{ github.event.repository.name }} ${{ github.ref_name }} → ${{ github.base_ref || github.event.repository.default_branch }}"

on:
  push:

permissions:
  statuses: write

jobs:
  trigger:
    name: Notify playwright_example_26
    runs-on: ubuntu-latest

    steps:
      - name: Set commit status → pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              sha:         context.sha,
              state:       'pending',
              context:     'playwright / api-smoke',
              description: 'API smoke tests running…',
            })

      - name: Send dispatch to playwright_example_26
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLAYWRIGHT_SUITE_PAT }}
          repository: AlexWork93/playwright_example_26
          event-type: app-updated
          client-payload: >
            {"sha": "${{ github.sha }}", "repo": "${{ github.repository }}",
             "repo_name": "${{ github.event.repository.name }}", "ref_name": "${{ github.ref_name }}",
             "base_ref": "${{ github.base_ref || github.event.repository.default_branch }}"}